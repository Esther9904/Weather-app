<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> WEATHER APP</title>
        <link rel="stylesheet" href="weather.css">
    </head>
    <body>
        <main class="dashboard">
            <div class="weather-card">
                <h2 class="city">Lagos</h2>
                <div class="weather-icon">☀️</div>
                <div class="weather-info">
                    <div class="temperature">29°C</div>
                    <div class="condition">Mostly Sunny</div>
                </div>
            </div>
            <div class="metrics">
                <div class="metric-card">
                    <h3>Humidity</h3>
                    <p>82%</p>
                </div>
                
                <div class="metric-card">
                    <h3>Wind Speed</h3>
                    <p>14 km/h</p>
                </div>

                <div class="metric-card">
                    <h3>Feels Like</h3>
                    <p>31°</p>
                </div>
            </div>
            <div class="forecast-section">
                <h2 class="forecast-title">5-Day Forecast</h2>
                <div class="forecast">
                    <div class="forecast-card">
                        <h3>Mon</h3>
                        <div class="forecast-icon">☀️</div>
                        <p>31°</p>
                    </div>

                    <div class="forecast-card">
                        <h3>Tue</h3>
                        <div class="forecast-icon">⛅</div>
                        <p>29°</p>
                    </div>

                    <div class="forecast-card">
                        <h3>Wed</h3>
                        <div class="forecast-icon">🌧️</div>
                        <p>26°</p>
                    </div>

                    <div class="forecast-card">
                        <h3>Thur</h3>
                        <div class="forecast-icon">☀️</div>
                        <p>30°</p>
                    </div>

                    <div class="forecast-card">
                        <h3>Fri</h3>
                        <div class="forecast-icon">☀️</div>
                        <p>32°</p>
                    </div>
                    
                </div>
            </div>
        </main>
        
    </body>
    <script src="WeatherApi.js"></script>
</html>
