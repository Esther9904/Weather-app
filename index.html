<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> WEATHER APP</title>
        <script src="https://unpkg.com/lucide@latest"></script>
        <link rel="stylesheet" href="weather.css">
    </head>
    <body>
        <div class="app">
            <aside class="sidebar">
                <div class="logo">☁️</div>
                <nav>
                    <div class="nav-icon active">🏠</div>
                    <div class="nav-icon">📊</div>
                    <div class="nav-icon">📍</div>
                    <div class="nav-icon">⚙️</div>
                </nav>
            </aside>
            
            <main class="dashboard">
                <div class="dashboard-header">
                    <div class="location-info">
                        <h1 class="city">Location</h1>
                        <p class="date">Current Date</p>
                    </div>
                    <div class="search-container">
                        <input
                        type="text"
                        class="search-input"
                        placeholder="Search location..."
                        >
                    </div>
                </div>
                <div class="weather-card">
                    <div class="weather-left">
                        <div class="weather-icon">
                            <i data-lucide="sun"></i>
                        </div>
                    </div>
                    
                    <div class="weather-center">
                        <div class="weather-label">
                            CURRENT WEATHER
                        </div>
                        <div class="temperature">Temp</div>
                        <div class="condition">Condition</div>
                    </div>

                    <div class="weather-right">
                        <div class="weather-stat">
                            <span>Feels Like</span>
                            <span class="feels">°</span>
                        </div>
                        <div class="weather-stat">
                            <span>Pressure</span>
                            <span class="pressure">hpa</span>
                        </div>
                        <div class="weather-stat">
                            <span>Visibility</span>
                            <span class="visible">km</span>
                        </div>
                    </div>
                </div>
                <div class="metrics">
                    <div class="metric-card">
                        <i data-lucide="droplets"></i>
                        <h3>Humidity</h3>
                        <p class="humidity-value">%</p>
                    </div>
                    
                    <div class="metric-card">
                        <i data-lucide="wind"></i>
                        <h3>Wind Speed</h3>
                        <p class="wind-speed">km/h</p>
                    </div>

                    <div class="metric-card">
                        <i data-lucide="sun"></i>
                        <h3>UV Index</h3>
                        <p class="uv-index">0</p>
                    </div>
                </div>
                <div class="forecast-section">
                    <h2 class="forecast-title">5-Day Forecast</h2>
                    <div class="forecast">
                        
                    </div>
                </div>
            </main>
        </div>
        <script>
            lucide.createIcons();
        </script>
        <script src="WeatherApi.js"></script>
    </body>
</html>
